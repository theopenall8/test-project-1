<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ты пойдёешь со мной свидание? 🥹</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper">
      <h2 class="question">Миледи, окажете ли вы мне честь провести вечер в моём обществе? </h2>
      <img
        class="gif"
        alt="gif"
        src="https://media.giphy.com/media/FTGah7Mx3ss04PcasF/giphy.gif"
      />
      <div class="btn-group">
        <button class="yes-btn">Да🫶</button>
        <button class="no-btn">Нет🙅‍♀️</button>
      <div id="success-message" style="display: none !important; margin-top: 20px; text-align: center;">
    <h2>Прекрасный выбор, Миледи! 🌹</h2>
    <p>Пожалуйста, укажите, когда и где вам будет удобнее встретиться:</p>
    <form action="https://web3forms.com" method="POST" id="date-form">
        <input type="hidden" name="access_key" value="e1e5fca8-e2ea-498a-8238-8062fb4fda76">

        <!-- Выбор Даты -->
        <div class="form-group">
            <label for="date">Выберите день:</label>
            <input type="date" id="date" name="Дата свидания" required>
        </div>

        <!-- Выбор Времени -->
        <div class="form-group">
            <label for="time">Выберите время:</label>
            <input type="time" id="time" name="Время свидания" required>
        </div>

        <!-- Выбор Места -->
        <div class="form-group">
            <label for="place">Где бы вы хотели провести время?</label>
            <select id="place" name="Место встречи" required>
                <option value="" disabled selected>-- Выберите вариант --</option>
                <option value="Уютная кофейня с лучшими десертами">Уютная кофейня с десертами</option>
                <option value="Прогулка по крышам или парку">Романтическая прогулка</option>
                <option value="Изысканный ужин в ресторане">Ужин в ресторане</option>
                <option value="Секретное место (сюрприз от меня)">Секретное место (Сюрприз)</option>
            </select>
        </div>
        <!-- Кнопка отправки -->
        <button type="submit" class="submit-btn">Отправить ✉️</button>
    </form>
</div>
    </div>
    <script src="script.js"></script>
    <script>
    // Ждем полной загрузки страницы
    window.addEventListener('DOMContentLoaded', () => {
        const question = document.querySelector(".question");
        const gif = document.querySelector(".gif");
        const yesBtn = document.querySelector(".yes-btn");
        const noBtn = document.querySelector(".no-btn");

        // 1. КЛИК НА "ДА"
        if (yesBtn) {
            yesBtn.addEventListener("click", () => {
                if (question) question.style.display = "none";
                if (gif) gif.style.display = "none";
                const btnGroup = document.querySelector(".btn-group");
                if (btnGroup) btnGroup.style.display = "none";

                const successMessage = document.getElementById("success-message");
                if (successMessage) {
                    successMessage.style.setProperty("display", "block", "important");
                }
            });
        }

        // 2. УБЕГАНИЕ КНОПКИ "НЕТ"
        function moveNoButton() {
            if (!noBtn) return;
            const noBtnRect = noBtn.getBoundingClientRect();
            const maxX = window.innerWidth - noBtnRect.width;
            const maxY = window.innerHeight - noBtnRect.height;

            const randomX = Math.floor(Math.random() * Math.max(maxX, 50));
            const randomY = Math.floor(Math.random() * Math.max(maxY, 50));

            noBtn.style.position = "fixed"; // fixed работает надежнее в контейнерах
            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
            noBtn.style.zIndex = "9999"; // выводим кнопку на самый передний план
        }

        if (noBtn) {
            noBtn.addEventListener("mouseover", moveNoButton);
            noBtn.addEventListener("touchstart", (e) => {
                e.preventDefault(); // отменяет стандартный клик на телефоне
                moveNoButton();
            });
        }
    });
</script>
  </body>
</html>
